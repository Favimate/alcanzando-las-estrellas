<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alcanzando las Estrellas — Acceso</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', sans-serif; }
    .gradient-bg { background: linear-gradient(135deg, #4c1d95 0%, #7c3aed 50%, #a855f7 100%); }
    .star { position: absolute; border-radius: 50%; background: rgba(255,255,255,0.15); animation: float 6s ease-in-out infinite; }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-20px)} }
  </style>
</head>
<body class="gradient-bg min-h-screen flex items-center justify-center overflow-hidden relative">

  <div class="star w-64 h-64 top-[-80px] left-[-60px]" style="animation-delay:0s"></div>
  <div class="star w-48 h-48 bottom-[-40px] right-[-30px]" style="animation-delay:2s"></div>
  <div class="star w-24 h-24 top-1/3 right-[-20px]" style="animation-delay:4s"></div>

  <div class="relative z-10 w-full max-w-md px-4">
    <div class="bg-white rounded-3xl shadow-2xl p-8">
      <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-purple-100 mb-4">
          <svg class="w-9 h-9 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"/>
          </svg>
        </div>
        <h1 class="text-2xl font-bold text-gray-800">Alcanzando las Estrellas</h1>
        <p class="text-sm text-gray-500 mt-1">Academia de Pole Dance — Administración</p>
      </div>

      <form id="loginForm" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Usuario</label>
          <input id="username" type="text" required autocomplete="username"
            class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-purple-400 text-gray-800 transition"
            placeholder="admin" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
          <input id="password" type="password" required autocomplete="current-password"
            class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-purple-400 text-gray-800 transition"
            placeholder="••••••••" />
        </div>
        <div id="errorMsg" class="hidden text-sm text-red-600 bg-red-50 px-4 py-2 rounded-lg"></div>
        <button type="submit" id="btnLogin"
          class="w-full py-3 px-6 rounded-xl bg-purple-600 hover:bg-purple-700 text-white font-semibold transition shadow-lg shadow-purple-200 disabled:opacity-60">
          Ingresar
        </button>
      </form>
    </div>
    <p class="text-center text-purple-200 text-xs mt-6">© 2025 Alcanzando las Estrellas</p>
  </div>

  <script>
    if (localStorage.getItem('token')) window.location.href = '/admin/dashboard.html';

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btnLogin');
      const errDiv = document.getElementById('errorMsg');
      btn.disabled = true;
      btn.textContent = 'Ingresando...';
      errDiv.classList.add('hidden');

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value,
          }),
        });
        if (res.ok) {
          const { token } = await res.json();
          localStorage.setItem('token', token);
          window.location.href = '/admin/dashboard.html';
        } else {
          const { error } = await res.json();
          errDiv.textContent = error || 'Error al ingresar';
          errDiv.classList.remove('hidden');
        }
      } catch {
        errDiv.textContent = 'Error de conexión';
        errDiv.classList.remove('hidden');
      }
      btn.disabled = false;
      btn.textContent = 'Ingresar';
    });
  </script>
</body>
</html>
