<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alcanzando las Estrellas — Acceso</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/admin/style.css" />
</head>
<body>
<div class="login-bg">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-icon">
        <svg width="36" height="36" style="color:#7c3aed" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"/>
        </svg>
      </div>
      <div class="login-title">Alcanzando las Estrellas</div>
      <div class="login-subtitle">Academia de Pole Dance — Administración</div>
    </div>

    <form id="loginForm">
      <div class="form-group">
        <label class="form-label">Usuario</label>
        <input id="username" type="text" required autocomplete="username"
          class="form-control" placeholder="admin" />
      </div>
      <div class="form-group">
        <label class="form-label">Contraseña</label>
        <input id="password" type="password" required autocomplete="current-password"
          class="form-control" placeholder="••••••••" />
      </div>
      <div id="errorMsg" class="form-error" style="display:none"></div>
      <div style="margin-top:1rem">
        <button type="submit" id="btnLogin" class="btn btn-primary btn-full">Ingresar</button>
      </div>
    </form>
  </div>
  <p class="login-footer">© 2025 Alcanzando las Estrellas</p>
</div>

<script>
  if (localStorage.getItem('token')) window.location.href = '/admin/dashboard.html';

  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn    = document.getElementById('btnLogin');
    const errDiv = document.getElementById('errorMsg');
    btn.disabled = true;
    btn.textContent = 'Ingresando...';
    errDiv.style.display = 'none';

    try {
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username: document.getElementById('username').value,
          password: document.getElementById('password').value,
        }),
      });
      if (res.ok) {
        const { token } = await res.json();
        localStorage.setItem('token', token);
        window.location.href = '/admin/dashboard.html';
      } else {
        const { error } = await res.json();
        errDiv.textContent = error || 'Error al ingresar';
        errDiv.style.display = 'block';
      }
    } catch {
      errDiv.textContent = 'Error de conexión';
      errDiv.style.display = 'block';
    }
    btn.disabled = false;
    btn.textContent = 'Ingresar';
  });
</script>
</body>
</html>
