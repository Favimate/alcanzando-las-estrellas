<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pagos — Alcanzando las Estrellas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/admin/style.css" />
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <div class="nav-logo">
      <div class="nav-icon">
        <svg width="16" height="16" fill="currentColor" viewBox="0 0 20 20">
          <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/>
        </svg>
      </div>
      <span class="nav-brand">Alcanzando las Estrellas</span>
    </div>
    <div class="nav-links">
      <a href="/admin/dashboard.html" class="nav-link">Dashboard</a>
      <a href="/admin/alumnas.html"   class="nav-link">Alumnas</a>
      <a href="/admin/pagos.html"     class="nav-link active">Pagos</a>
      <button id="btnLogout" class="nav-link danger">Salir</button>
    </div>
  </div>
</nav>

<div class="main">
  <div class="page-header">
    <div>
      <h1 class="page-title">Control de Pagos</h1>
      <p id="subtitulo" class="page-subtitle">Cargando…</p>
    </div>
    <div class="month-nav">
      <button class="btn-nav" id="btnMesAnterior">
        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
        </svg>
      </button>
      <div class="month-selects">
        <select id="selMes" class="form-control">
          <option value="1">Enero</option><option value="2">Febrero</option>
          <option value="3">Marzo</option><option value="4">Abril</option>
          <option value="5">Mayo</option><option value="6">Junio</option>
          <option value="7">Julio</option><option value="8">Agosto</option>
          <option value="9">Septiembre</option><option value="10">Octubre</option>
          <option value="11">Noviembre</option><option value="12">Diciembre</option>
        </select>
        <select id="selAño" class="form-control"></select>
      </div>
      <button class="btn-nav" id="btnMesSiguiente">
        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="status-row">
    <div class="status-item">
      <span class="badge-dot dot-green" style="width:.625rem;height:.625rem;border-radius:50%;display:inline-block"></span>
      Pagadas: <strong id="cntPagadas" class="green">—</strong>
    </div>
    <div class="status-item">
      <span class="badge-dot dot-amber" style="width:.625rem;height:.625rem;border-radius:50%;display:inline-block"></span>
      Pendientes: <strong id="cntPendientes" class="amber">—</strong>
    </div>
    <div class="status-item">Recaudado: <strong id="totalRecaudado">—</strong></div>
    <div class="status-item">Por cobrar: <strong id="totalPorCobrar" class="red">—</strong></div>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Alumna</th>
          <th>Plan</th>
          <th>Monto</th>
          <th>Estado</th>
          <th>Fecha pago</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="tablaPagos">
        <tr><td colspan="6" class="center">Cargando…</td></tr>
      </tbody>
    </table>
  </div>

  <div class="flex-right">
    <button id="btnMarcarTodas" class="btn btn-outline">
      <svg width="16" height="16" fill="none" stroke="currentColor" style="color:#22c55e" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
      </svg>
      Marcar todas como pagadas
    </button>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
  const TOKEN = localStorage.getItem('token');
  if (!TOKEN) window.location.href = '/admin/';

  const PLANES = { 1:'1 clase/sem', 2:'2 clases/sem', 3:'3 clases/sem' };
  const MESES  = ['','Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const fmt    = n => '$' + Number(n).toLocaleString('es-CL');

  const api = (path, opts={}) => fetch(`/api/${path}`, {
    ...opts,
    headers: { 'Authorization':`Bearer ${TOKEN}`, 'Content-Type':'application/json', ...(opts.headers||{}) }
  });

  document.getElementById('btnLogout').addEventListener('click', () => {
    localStorage.removeItem('token'); window.location.href = '/admin/';
  });

  const now = new Date();
  const selMes = document.getElementById('selMes');
  const selAño = document.getElementById('selAño');
  selMes.value = now.getMonth() + 1;
  for (let y = now.getFullYear(); y >= now.getFullYear() - 3; y--) {
    const opt = document.createElement('option');
    opt.value = y; opt.textContent = y;
    selAño.appendChild(opt);
  }
  selAño.value = now.getFullYear();

  selMes.addEventListener('change', cargarPagos);
  selAño.addEventListener('change', cargarPagos);
  document.getElementById('btnMesAnterior').addEventListener('click', () => {
    let m = Number(selMes.value)-1, y = Number(selAño.value);
    if (m < 1) { m=12; y--; }
    selMes.value=m; selAño.value=y; cargarPagos();
  });
  document.getElementById('btnMesSiguiente').addEventListener('click', () => {
    let m = Number(selMes.value)+1, y = Number(selAño.value);
    if (m > 12) { m=1; y++; }
    selMes.value=m; selAño.value=y; cargarPagos();
  });

  let pagosData = [];

  async function cargarPagos() {
    const mes = selMes.value, año = selAño.value;
    const res = await api(`pagos?mes=${mes}&año=${año}`);
    if (res.status === 401) { localStorage.removeItem('token'); window.location.href='/admin/'; return; }
    pagosData = await res.json();
    document.getElementById('subtitulo').textContent = `${MESES[mes]} ${año}`;

    const pagadas    = pagosData.filter(p => p.estado === 'pagado').length;
    const pendientes = pagosData.filter(p => p.estado !== 'pagado').length;
    const recaudado  = pagosData.filter(p => p.estado === 'pagado').reduce((s,p) => s+(p.monto_pagado||p.monto_plan), 0);
    const porCobrar  = pagosData.filter(p => p.estado !== 'pagado').reduce((s,p) => s+p.monto_plan, 0);

    document.getElementById('cntPagadas').textContent    = pagadas;
    document.getElementById('cntPendientes').textContent  = pendientes;
    document.getElementById('totalRecaudado').textContent = fmt(recaudado);
    document.getElementById('totalPorCobrar').textContent = fmt(porCobrar);
    renderTablaPagos();
  }

  function renderTablaPagos() {
    const tbody = document.getElementById('tablaPagos');
    if (!pagosData.length) {
      tbody.innerHTML = `<tr><td colspan="6" class="center">No hay alumnas activas</td></tr>`;
      return;
    }
    tbody.innerHTML = pagosData.map(p => {
      const pagado = p.estado === 'pagado';
      return `
      <tr>
        <td><strong>${p.nombre}</strong></td>
        <td><span class="badge badge-purple">${PLANES[p.plan]}</span></td>
        <td><strong>${fmt(p.monto_plan)}</strong></td>
        <td>
          <span class="badge ${pagado ? 'badge-green' : 'badge-amber'}">
            <span class="badge-dot ${pagado ? 'dot-green' : 'dot-amber'}"></span>
            ${pagado ? 'Pagado' : 'Pendiente'}
          </span>
        </td>
        <td class="muted">${p.fecha_pago ? formatFecha(p.fecha_pago) : '—'}</td>
        <td class="right">
          <button onclick="togglePago(${p.id},'${pagado?'pendiente':'pagado'}')"
            class="btn-xs ${pagado ? 'pagado' : 'pendiente'}">
            ${pagado ? '↩ Revertir' : '✓ Marcar pagado'}
          </button>
        </td>
      </tr>`;
    }).join('');
  }

  function formatFecha(f) {
    if (!f) return '—';
    const [y,m,d] = f.split('T')[0].split('-');
    return `${d}/${m}/${y}`;
  }

  async function togglePago(alumnaId, nuevoEstado) {
    const mes = Number(selMes.value), año = Number(selAño.value);
    const res = await api('pagos', { method:'POST', body: JSON.stringify({ alumna_id: alumnaId, mes, año, estado: nuevoEstado }) });
    if (res.ok) {
      toast(nuevoEstado === 'pagado' ? '✅ Pago registrado' : '↩ Pago revertido',
            nuevoEstado === 'pagado' ? 'green' : 'amber');
      cargarPagos();
    } else { toast('❌ Error al actualizar', 'red'); }
  }

  document.getElementById('btnMarcarTodas').addEventListener('click', async () => {
    const pendientes = pagosData.filter(p => p.estado !== 'pagado');
    if (!pendientes.length) { toast('Todas ya están pagadas ✅', 'purple'); return; }
    const mes = Number(selMes.value), año = Number(selAño.value);
    for (const p of pendientes) {
      await api('pagos', { method:'POST', body: JSON.stringify({ alumna_id: p.id, mes, año, estado: 'pagado' }) });
    }
    toast(`✅ ${pendientes.length} pagos registrados`, 'green');
    cargarPagos();
  });

  function toast(msg, type) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = `toast open ${type}`;
    setTimeout(() => el.classList.remove('open'), 3000);
  }

  cargarPagos();
</script>
</body>
</html>
