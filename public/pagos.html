<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pagos — Alcanzando las Estrellas</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>body { font-family:'Inter',sans-serif; }</style>
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- NAV -->
  <nav class="bg-white border-b border-gray-100 shadow-sm sticky top-0 z-30">
    <div class="max-w-6xl mx-auto px-4 flex items-center justify-between h-16">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-full bg-purple-600 flex items-center justify-center">
          <svg class="w-4 h-4 text-white" fill="currentColor" viewBox="0 0 20 20">
            <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/>
          </svg>
        </div>
        <span class="font-bold text-gray-800 text-sm hidden sm:block">Alcanzando las Estrellas</span>
      </div>
      <div class="flex items-center gap-1">
        <a href="/dashboard.html" class="px-3 py-2 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-100">Dashboard</a>
        <a href="/alumnas.html"   class="px-3 py-2 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-100">Alumnas</a>
        <a href="/pagos.html"     class="px-3 py-2 rounded-lg text-sm font-medium bg-purple-50 text-purple-700">Pagos</a>
        <button id="btnLogout" class="ml-2 px-3 py-2 rounded-lg text-sm font-medium text-red-500 hover:bg-red-50">Salir</button>
      </div>
    </div>
  </nav>

  <main class="max-w-6xl mx-auto px-4 py-8">

    <!-- Header -->
    <div class="mb-6 flex flex-col sm:flex-row sm:items-center justify-between gap-4">
      <div>
        <h1 class="text-2xl font-bold text-gray-800">Control de Pagos</h1>
        <p id="subtitulo" class="text-gray-500 text-sm mt-1">Cargando…</p>
      </div>
      <!-- Selector mes / año -->
      <div class="flex items-center gap-2">
        <button id="btnMesAnterior"
          class="p-2 rounded-xl border border-gray-200 hover:bg-gray-100 text-gray-600 transition">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
          </svg>
        </button>
        <div class="flex gap-2">
          <select id="selMes"
            class="px-3 py-2 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-purple-400 text-sm bg-white">
            <option value="1">Enero</option><option value="2">Febrero</option>
            <option value="3">Marzo</option><option value="4">Abril</option>
            <option value="5">Mayo</option><option value="6">Junio</option>
            <option value="7">Julio</option><option value="8">Agosto</option>
            <option value="9">Septiembre</option><option value="10">Octubre</option>
            <option value="11">Noviembre</option><option value="12">Diciembre</option>
          </select>
          <select id="selAño"
            class="px-3 py-2 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-purple-400 text-sm bg-white">
          </select>
        </div>
        <button id="btnMesSiguiente"
          class="p-2 rounded-xl border border-gray-200 hover:bg-gray-100 text-gray-600 transition">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Barra de resumen rápido -->
    <div id="barraResumen" class="flex gap-4 mb-6 flex-wrap">
      <div class="flex items-center gap-2 text-sm">
        <span class="w-2.5 h-2.5 rounded-full bg-green-500"></span>
        <span class="text-gray-600">Pagadas: <strong id="cntPagadas" class="text-green-700">—</strong></span>
      </div>
      <div class="flex items-center gap-2 text-sm">
        <span class="w-2.5 h-2.5 rounded-full bg-amber-400"></span>
        <span class="text-gray-600">Pendientes: <strong id="cntPendientes" class="text-amber-600">—</strong></span>
      </div>
      <div class="flex items-center gap-2 text-sm">
        <span class="text-gray-600">Recaudado: <strong id="totalRecaudado" class="text-gray-800">—</strong></span>
      </div>
      <div class="flex items-center gap-2 text-sm">
        <span class="text-gray-600">Por cobrar: <strong id="totalPorCobrar" class="text-red-600">—</strong></span>
      </div>
    </div>

    <!-- Tabla de pagos -->
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
      <table class="w-full text-sm">
        <thead>
          <tr class="border-b border-gray-100 bg-gray-50">
            <th class="text-left px-5 py-3 font-medium text-gray-500 text-xs uppercase tracking-wide">Alumna</th>
            <th class="text-left px-5 py-3 font-medium text-gray-500 text-xs uppercase tracking-wide hidden sm:table-cell">Plan</th>
            <th class="text-left px-5 py-3 font-medium text-gray-500 text-xs uppercase tracking-wide">Monto</th>
            <th class="text-left px-5 py-3 font-medium text-gray-500 text-xs uppercase tracking-wide">Estado</th>
            <th class="text-left px-5 py-3 font-medium text-gray-500 text-xs uppercase tracking-wide hidden md:table-cell">Fecha pago</th>
            <th class="px-5 py-3"></th>
          </tr>
        </thead>
        <tbody id="tablaPagos">
          <tr><td colspan="6" class="text-center py-10 text-gray-400">Cargando…</td></tr>
        </tbody>
      </table>
    </div>

    <!-- Botón marcar todas pagadas -->
    <div class="mt-4 flex justify-end">
      <button id="btnMarcarTodas"
        class="px-4 py-2 rounded-xl border border-gray-200 text-sm text-gray-600 hover:bg-gray-50 flex items-center gap-2">
        <svg class="w-4 h-4 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        Marcar todas como pagadas
      </button>
    </div>
  </main>

  <!-- Toast -->
  <div id="toast" class="hidden fixed bottom-6 right-6 px-5 py-3 rounded-2xl text-white text-sm font-medium shadow-lg z-50 transition"></div>

  <script>
    const TOKEN = localStorage.getItem('token');
    if (!TOKEN) window.location.href = '/';

    const PLANES = { 1:'1 clase/sem', 2:'2 clases/sem', 3:'3 clases/sem' };
    const fmt = n => '$' + Number(n).toLocaleString('es-CL');

    const api = (path, opts={}) => fetch(`/api/${path}`, {
      ...opts,
      headers: { 'Authorization':`Bearer ${TOKEN}`, 'Content-Type':'application/json', ...(opts.headers||{}) }
    });

    document.getElementById('btnLogout').addEventListener('click', () => {
      localStorage.removeItem('token'); window.location.href = '/';
    });

    // Init selects
    const now = new Date();
    let mesActual = now.getMonth() + 1;
    let añoActual = now.getFullYear();

    const selMes = document.getElementById('selMes');
    const selAño = document.getElementById('selAño');

    selMes.value = mesActual;
    for (let y = añoActual; y >= añoActual - 3; y--) {
      const opt = document.createElement('option');
      opt.value = y; opt.textContent = y;
      selAño.appendChild(opt);
    }
    selAño.value = añoActual;

    selMes.addEventListener('change', cargarPagos);
    selAño.addEventListener('change', cargarPagos);

    document.getElementById('btnMesAnterior').addEventListener('click', () => {
      let m = Number(selMes.value) - 1;
      let y = Number(selAño.value);
      if (m < 1) { m = 12; y--; }
      selMes.value = m; selAño.value = y;
      cargarPagos();
    });

    document.getElementById('btnMesSiguiente').addEventListener('click', () => {
      let m = Number(selMes.value) + 1;
      let y = Number(selAño.value);
      if (m > 12) { m = 1; y++; }
      selMes.value = m; selAño.value = y;
      cargarPagos();
    });

    let pagosData = [];

    async function cargarPagos() {
      const mes = selMes.value;
      const año = selAño.value;
      const res = await api(`pagos?mes=${mes}&año=${año}`);
      if (res.status === 401) { localStorage.removeItem('token'); window.location.href='/'; return; }
      pagosData = await res.json();

      const MESES = ['','Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
      document.getElementById('subtitulo').textContent = `${MESES[mes]} ${año}`;

      // Resumen
      const pagadas    = pagosData.filter(p => p.estado === 'pagado').length;
      const pendientes = pagosData.filter(p => p.estado !== 'pagado').length;
      const recaudado  = pagosData.filter(p => p.estado === 'pagado').reduce((s,p) => s + (p.monto_pagado || p.monto_plan), 0);
      const porCobrar  = pagosData.filter(p => p.estado !== 'pagado').reduce((s,p) => s + p.monto_plan, 0);

      document.getElementById('cntPagadas').textContent    = pagadas;
      document.getElementById('cntPendientes').textContent  = pendientes;
      document.getElementById('totalRecaudado').textContent = fmt(recaudado);
      document.getElementById('totalPorCobrar').textContent = fmt(porCobrar);

      renderTablaPagos();
    }

    function renderTablaPagos() {
      const tbody = document.getElementById('tablaPagos');
      if (!pagosData.length) {
        tbody.innerHTML = `<tr><td colspan="6" class="text-center py-12 text-gray-400">No hay alumnas activas</td></tr>`;
        return;
      }

      tbody.innerHTML = pagosData.map(p => {
        const pagado = p.estado === 'pagado';
        return `
        <tr class="border-b border-gray-50 hover:bg-gray-50 transition">
          <td class="px-5 py-3 font-medium text-gray-800">${p.nombre}</td>
          <td class="px-5 py-3 hidden sm:table-cell">
            <span class="text-xs text-purple-600 bg-purple-50 px-2 py-0.5 rounded-full">${PLANES[p.plan]}</span>
          </td>
          <td class="px-5 py-3 font-medium text-gray-700">${fmt(p.monto_plan)}</td>
          <td class="px-5 py-3">
            <span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-medium
              ${pagado ? 'bg-green-50 text-green-700' : 'bg-amber-50 text-amber-700'}">
              <span class="w-1.5 h-1.5 rounded-full ${pagado ? 'bg-green-500' : 'bg-amber-400'}"></span>
              ${pagado ? 'Pagado' : 'Pendiente'}
            </span>
          </td>
          <td class="px-5 py-3 text-gray-500 hidden md:table-cell">
            ${p.fecha_pago ? formatFecha(p.fecha_pago) : '—'}
          </td>
          <td class="px-5 py-3 text-right">
            <button onclick="togglePago(${p.id}, ${p.pago_id || 'null'}, '${pagado ? 'pendiente' : 'pagado'}')"
              class="px-3 py-1.5 rounded-lg text-xs font-medium transition
                ${pagado
                  ? 'text-amber-600 bg-amber-50 hover:bg-amber-100'
                  : 'text-green-600 bg-green-50 hover:bg-green-100'}">
              ${pagado ? '↩ Revertir' : '✓ Marcar pagado'}
            </button>
          </td>
        </tr>`;
      }).join('');
    }

    function formatFecha(fecha) {
      if (!fecha) return '—';
      const [y,m,d] = fecha.split('T')[0].split('-');
      return `${d}/${m}/${y}`;
    }

    async function togglePago(alumnaId, pagoId, nuevoEstado) {
      const mes = Number(selMes.value);
      const año = Number(selAño.value);

      const res = await api('pagos', {
        method: 'POST',
        body: JSON.stringify({ alumna_id: alumnaId, mes, año, estado: nuevoEstado })
      });

      if (res.ok) {
        mostrarToast(nuevoEstado === 'pagado' ? '✅ Pago registrado' : '↩ Pago revertido',
          nuevoEstado === 'pagado' ? 'bg-green-600' : 'bg-amber-500');
        cargarPagos();
      } else {
        mostrarToast('❌ Error al actualizar', 'bg-red-500');
      }
    }

    document.getElementById('btnMarcarTodas').addEventListener('click', async () => {
      const pendientes = pagosData.filter(p => p.estado !== 'pagado');
      if (!pendientes.length) { mostrarToast('Todas ya están pagadas ✅', 'bg-purple-600'); return; }

      const mes = Number(selMes.value);
      const año = Number(selAño.value);

      for (const p of pendientes) {
        await api('pagos', {
          method: 'POST',
          body: JSON.stringify({ alumna_id: p.id, mes, año, estado: 'pagado' })
        });
      }

      mostrarToast(`✅ ${pendientes.length} pagos registrados`, 'bg-green-600');
      cargarPagos();
    });

    function mostrarToast(msg, cls) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.className = `fixed bottom-6 right-6 px-5 py-3 rounded-2xl text-white text-sm font-medium shadow-lg z-50 ${cls}`;
      toast.classList.remove('hidden');
      setTimeout(() => toast.classList.add('hidden'), 3000);
    }

    cargarPagos();
  </script>
</body>
</html>
