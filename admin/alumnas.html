<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alumnas — Alcanzando las Estrellas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/admin/style.css" />
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <div class="nav-logo">
      <div class="nav-icon">
        <svg width="16" height="16" fill="currentColor" viewBox="0 0 20 20">
          <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/>
        </svg>
      </div>
      <span class="nav-brand">Alcanzando las Estrellas</span>
    </div>
    <div class="nav-links">
      <a href="/admin/dashboard.html" class="nav-link">Dashboard</a>
      <a href="/admin/alumnas.html"   class="nav-link active">Alumnas</a>
      <a href="/admin/pagos.html"     class="nav-link">Pagos</a>
      <button id="btnLogout" class="nav-link danger">Salir</button>
    </div>
  </div>
</nav>

<div class="main">
  <div class="page-header">
    <div>
      <h1 class="page-title">Alumnas</h1>
      <p id="subtitulo" class="page-subtitle">Cargando…</p>
    </div>
    <button id="btnNueva" class="btn btn-primary">
      <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
      </svg>
      Nueva Alumna
    </button>
  </div>

  <div class="search-bar">
    <input id="buscador" type="text" class="form-control" placeholder="Buscar por nombre o teléfono…" />
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Nombre</th>
          <th>Teléfono</th>
          <th>Plan</th>
          <th>Ingreso</th>
          <th>Estado</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="tablaAlumnas">
        <tr><td colspan="6" class="center">Cargando alumnas…</td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- Modal Alumna -->
<div id="modalAlumna" class="modal-backdrop">
  <div class="modal">
    <div id="modalTitulo" class="modal-title">Nueva Alumna</div>
    <form id="formAlumna">
      <input type="hidden" id="alumnaId" />
      <div class="form-group">
        <label class="form-label">Nombre completo *</label>
        <input id="fNombre" type="text" required class="form-control" />
      </div>
      <div class="form-group">
        <label class="form-label">Teléfono WhatsApp * <small>(ej: 912345678)</small></label>
        <div class="input-group">
          <span class="input-prefix">+56</span>
          <input id="fTelefono" type="tel" required pattern="[0-9]{8,9}" class="form-control" />
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Plan *</label>
        <select id="fPlan" required class="form-control">
          <option value="">Seleccionar…</option>
          <option value="1">1 clase/semana — $45.000</option>
          <option value="2">2 clases/semana — $55.000</option>
          <option value="3">3 clases/semana — $65.000</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Fecha de ingreso *</label>
        <input id="fIngreso" type="date" required class="form-control" />
      </div>
      <div class="form-group">
        <label class="form-label">Notas (opcional)</label>
        <textarea id="fNotas" rows="2" class="form-control"></textarea>
      </div>
      <div id="fActivaWrapper" class="form-check" style="display:none;margin-bottom:.75rem">
        <input id="fActiva" type="checkbox" />
        <label>Alumna activa</label>
      </div>
      <div id="errForm" class="form-error" style="display:none"></div>
      <div class="modal-footer">
        <button type="button" id="btnCancelar" class="btn btn-outline">Cancelar</button>
        <button type="submit" id="btnGuardar" class="btn btn-primary">Guardar</button>
      </div>
    </form>
  </div>
</div>

<!-- Modal Eliminar -->
<div id="modalEliminar" class="modal-backdrop">
  <div class="modal">
    <div class="modal-icon-row">
      <div class="modal-icon red">
        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
        </svg>
      </div>
      <div class="modal-title" style="margin-bottom:0">Desactivar alumna</div>
    </div>
    <p class="modal-desc">¿Desactivar a <strong id="eliminarNombre"></strong>? No se eliminan sus datos ni historial de pagos.</p>
    <div class="modal-footer">
      <button id="btnCancelarElim" class="btn btn-outline">Cancelar</button>
      <button id="btnConfirmarElim" class="btn" style="background:#ef4444;color:white">Desactivar</button>
    </div>
  </div>
</div>

<script>
  const TOKEN = localStorage.getItem('token');
  if (!TOKEN) window.location.href = '/admin/';

  const PLANES = { 1:'1 clase/sem', 2:'2 clases/sem', 3:'3 clases/sem' };
  const MONTOS = { 1:'$45.000', 2:'$55.000', 3:'$65.000' };

  const api = (path, opts={}) => fetch(`/api/${path}`, {
    ...opts,
    headers: { 'Authorization':`Bearer ${TOKEN}`, 'Content-Type':'application/json', ...(opts.headers||{}) }
  });

  document.getElementById('btnLogout').addEventListener('click', () => {
    localStorage.removeItem('token'); window.location.href = '/admin/';
  });

  let alumnas = [];

  async function cargarAlumnas() {
    const res = await api('alumnas?activas=false');
    if (res.status === 401) { localStorage.removeItem('token'); window.location.href='/admin/'; return; }
    alumnas = await res.json();
    renderTabla(alumnas);
    const activas = alumnas.filter(a => a.activa).length;
    document.getElementById('subtitulo').textContent = `${activas} alumnas activas · ${alumnas.length} total`;
  }

  function renderTabla(lista) {
    const tbody = document.getElementById('tablaAlumnas');
    if (!lista.length) {
      tbody.innerHTML = `<tr><td colspan="6" class="center">No hay alumnas registradas</td></tr>`;
      return;
    }
    tbody.innerHTML = lista.map(a => `
      <tr class="${!a.activa ? 'inactive' : ''}">
        <td><strong>${a.nombre}</strong></td>
        <td class="muted">${a.telefono}</td>
        <td><span class="badge badge-purple">${PLANES[a.plan]} · ${MONTOS[a.plan]}</span></td>
        <td class="muted">${formatFecha(a.fecha_ingreso)}</td>
        <td>
          <span class="badge ${a.activa ? 'badge-green' : 'badge-gray'}">
            <span class="badge-dot ${a.activa ? 'dot-green' : 'dot-gray'}"></span>
            ${a.activa ? 'Activa' : 'Inactiva'}
          </span>
        </td>
        <td class="right">
          <div class="td-actions">
            <button class="btn-icon" onclick="editarAlumna(${a.id})" title="Editar">
              <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
              </svg>
            </button>
            ${a.activa ? `<button class="btn-icon danger" onclick="confirmarEliminar(${a.id},'${a.nombre.replace(/'/g,"\\'")}')">
              <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636"/>
              </svg>
            </button>` : ''}
          </div>
        </td>
      </tr>`).join('');
  }

  function formatFecha(f) {
    if (!f) return '—';
    const [y,m,d] = f.split('-');
    return `${d}/${m}/${y}`;
  }

  document.getElementById('buscador').addEventListener('input', function() {
    const q = this.value.toLowerCase();
    renderTabla(alumnas.filter(a => a.nombre.toLowerCase().includes(q) || a.telefono.includes(q)));
  });

  document.getElementById('btnNueva').addEventListener('click', () => {
    document.getElementById('modalTitulo').textContent = 'Nueva Alumna';
    document.getElementById('formAlumna').reset();
    document.getElementById('alumnaId').value = '';
    document.getElementById('fActivaWrapper').style.display = 'none';
    document.getElementById('fIngreso').value = new Date().toISOString().split('T')[0];
    document.getElementById('errForm').style.display = 'none';
    document.getElementById('modalAlumna').classList.add('open');
  });

  document.getElementById('btnCancelar').addEventListener('click', () => {
    document.getElementById('modalAlumna').classList.remove('open');
  });

  function editarAlumna(id) {
    const a = alumnas.find(x => x.id === id);
    if (!a) return;
    document.getElementById('modalTitulo').textContent = 'Editar Alumna';
    document.getElementById('alumnaId').value  = a.id;
    document.getElementById('fNombre').value   = a.nombre;
    document.getElementById('fTelefono').value = a.telefono.replace(/^\+?56/, '');
    document.getElementById('fPlan').value     = a.plan;
    document.getElementById('fIngreso').value  = a.fecha_ingreso;
    document.getElementById('fNotas').value    = a.notas || '';
    document.getElementById('fActiva').checked = !!a.activa;
    document.getElementById('fActivaWrapper').style.display = 'flex';
    document.getElementById('errForm').style.display = 'none';
    document.getElementById('modalAlumna').classList.add('open');
  }

  document.getElementById('formAlumna').addEventListener('submit', async (e) => {
    e.preventDefault();
    const errDiv = document.getElementById('errForm');
    errDiv.style.display = 'none';
    const btn = document.getElementById('btnGuardar');
    btn.disabled = true;
    const id = document.getElementById('alumnaId').value;
    const payload = {
      nombre:        document.getElementById('fNombre').value.trim(),
      telefono:      '+56' + document.getElementById('fTelefono').value.replace(/^0/,''),
      plan:          Number(document.getElementById('fPlan').value),
      fecha_ingreso: document.getElementById('fIngreso').value,
      notas:         document.getElementById('fNotas').value.trim(),
      activa:        document.getElementById('fActiva').checked,
    };
    try {
      const res = id
        ? await api(`alumnas/${id}`, { method:'PUT',  body: JSON.stringify(payload) })
        : await api('alumnas',        { method:'POST', body: JSON.stringify(payload) });
      if (res.ok) {
        document.getElementById('modalAlumna').classList.remove('open');
        cargarAlumnas();
      } else {
        const { error } = await res.json();
        errDiv.textContent = error || 'Error al guardar';
        errDiv.style.display = 'block';
      }
    } catch {
      errDiv.textContent = 'Error de conexión';
      errDiv.style.display = 'block';
    }
    btn.disabled = false;
  });

  let eliminarId = null;
  function confirmarEliminar(id, nombre) {
    eliminarId = id;
    document.getElementById('eliminarNombre').textContent = nombre;
    document.getElementById('modalEliminar').classList.add('open');
  }
  document.getElementById('btnCancelarElim').addEventListener('click', () => {
    document.getElementById('modalEliminar').classList.remove('open');
  });
  document.getElementById('btnConfirmarElim').addEventListener('click', async () => {
    if (!eliminarId) return;
    await api(`alumnas/${eliminarId}`, { method:'DELETE' });
    document.getElementById('modalEliminar').classList.remove('open');
    cargarAlumnas();
  });

  cargarAlumnas();
</script>
</body>
</html>
